pre-commit:
  parallel: true
  jobs:
    - name: biome check
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: npx biome check --no-errors-on-unmatched {staged_files}

    - name: forge fmt check
      glob: "*.sol"
      run: cd packages/contracts && forge fmt --check

    - name: typecheck
      run: pnpm typecheck

commit-msg:
  jobs:
    - name: commitlint
      run: npx commitlint --edit {1}

pre-push:
  jobs:
    - name: test
      run: pnpm test
