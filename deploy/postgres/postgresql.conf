# KiteID PostgreSQL 17 tuning — CAX21 (4 vCPU / 8 GB)
# Based on ADR-07

# Memory
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 48MB
maintenance_work_mem = 256MB

# Connections
max_connections = 100
superuser_reserved_connections = 3

# WAL
wal_compression = on
wal_buffers = 16MB
max_wal_size = 2GB
min_wal_size = 128MB

# Disk
random_page_cost = 1.1
effective_io_concurrency = 200

# Parallelism
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# Autovacuum (aggressive for write-heavy indexer workload)
autovacuum_naptime = 30s
autovacuum_vacuum_cost_limit = 2000
autovacuum_max_workers = 3

# Logging
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_timezone = 'UTC'

# Locale
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'

# Stats
track_activities = on
track_counts = on
track_io_timing = on
