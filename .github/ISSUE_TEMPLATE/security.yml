name: Security Issue
description: Report a non-critical security concern (for critical vulnerabilities, email security@kiteid.xyz)
labels: ['security']
body:
  - type: markdown
    attributes:
      value: |
        **For critical vulnerabilities, do NOT open a public issue.**
        Email security@kiteid.xyz instead. See [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the security concern
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Potential Impact
      description: What could an attacker do with this?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can this be verified?
