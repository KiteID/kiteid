name: Contracts CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/contracts/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/contracts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        working-directory: packages/contracts
        run: forge build --sizes

      - name: Test (default profile)
        working-directory: packages/contracts
        run: forge test -vvv

      - name: Test (CI profile — high fuzz)
        working-directory: packages/contracts
        run: FOUNDRY_PROFILE=ci forge test -vvv

      - name: Format check
        working-directory: packages/contracts
        run: forge fmt --check

      - name: Gas snapshot
        working-directory: packages/contracts
        run: forge snapshot

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Generate coverage
        working-directory: packages/contracts
        run: forge coverage --report summary

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build for Slither
        working-directory: packages/contracts
        run: forge build

      - uses: crytic/slither-action@v0.4.2
        id: slither
        with:
          target: packages/contracts
          sarif: results.sarif
          fail-on: high
          slither-config: packages/contracts/slither.config.json

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: results.sarif

  aderyn:
    name: Aderyn Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build for Aderyn
        working-directory: packages/contracts
        run: forge build

      - name: Install Aderyn
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ADERYN_VER=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" https://api.github.com/repos/Cyfrin/aderyn/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSfL "https://github.com/Cyfrin/aderyn/releases/download/${ADERYN_VER}/aderyn-x86_64-unknown-linux-gnu.tar.xz" | tar xJ
          sudo mv aderyn-x86_64-unknown-linux-gnu/aderyn /usr/local/bin/aderyn

      - name: Run Aderyn
        working-directory: packages/contracts
        run: aderyn --config aderyn.toml --output aderyn-report.md

      - name: Upload Aderyn report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aderyn-report
          path: packages/contracts/aderyn-report.md

  halmos:
    name: Halmos Symbolic Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        working-directory: packages/contracts
        run: forge build

      - name: Install Halmos
        run: pip install halmos

      - name: Run Halmos
        working-directory: packages/contracts
        run: |
          halmos \
            --contract HalmosProperties \
            --solver-timeout-assertion 30000 \
            --solver z3 \
            -vvv
