name: Contracts CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/contracts/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/contracts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Forge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        working-directory: packages/contracts
        run: forge build

      - name: Test
        working-directory: packages/contracts
        run: forge test -vvv

      - name: Format check
        working-directory: packages/contracts
        run: forge fmt --check

      - name: Gas snapshot
        working-directory: packages/contracts
        run: forge snapshot
