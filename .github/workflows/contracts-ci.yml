name: Contracts CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/contracts/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/contracts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        working-directory: packages/contracts
        run: forge build --sizes

      - name: Test (default profile)
        working-directory: packages/contracts
        run: forge test -vvv

      - name: Test (CI profile — high fuzz)
        working-directory: packages/contracts
        run: FOUNDRY_PROFILE=ci forge test -vvv

      - name: Format check
        working-directory: packages/contracts
        run: forge fmt --check

      - name: Gas snapshot
        working-directory: packages/contracts
        run: forge snapshot

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Generate coverage
        working-directory: packages/contracts
        run: forge coverage --report summary

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build for Slither
        working-directory: packages/contracts
        run: forge build

      - uses: crytic/slither-action@v0.4.0
        id: slither
        continue-on-error: true
        with:
          target: packages/contracts
          sarif: results.sarif
          fail-on: high
          slither-config: packages/contracts/slither.config.json

      - name: Check SARIF exists
        id: sarif-check
        if: always()
        run: |
          if [ -f results.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SARIF file not generated — Slither may have crashed"
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.sarif-check.outputs.exists == 'true'
        with:
          sarif_file: results.sarif

      - name: Fail if Slither errored
        if: always() && steps.slither.outcome == 'failure' && steps.sarif-check.outputs.exists == 'false'
        run: |
          echo "::error::Slither failed without producing results. Check config and dependencies."
          exit 1
