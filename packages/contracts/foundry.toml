[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.34"
optimizer = true
optimizer_runs = 10_000
via_ir = false
evm_version = "cancun"
gas_reports = ["*"]

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 256
depth = 15

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "single"
sort_imports = true

# CI profile — higher fuzz/invariant runs
[profile.ci]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.34"
optimizer = true
optimizer_runs = 10_000
via_ir = false
evm_version = "cancun"

[profile.ci.fuzz]
runs = 1024
max_test_rejects = 65536

[profile.ci.invariant]
runs = 512
depth = 25

# Intense profile — pre-audit exhaustive testing
[profile.intense]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.34"
optimizer = true
optimizer_runs = 10_000
via_ir = false
evm_version = "cancun"

[profile.intense.fuzz]
runs = 10_000
max_test_rejects = 65536

[profile.intense.invariant]
runs = 1024
depth = 50

[rpc_endpoints]
kite_mainnet = "${KITE_RPC_URL}"
kite_testnet = "${KITE_TESTNET_RPC_URL}"

[etherscan]
kite_mainnet = { key = "${KITESCAN_API_KEY}", url = "https://kitescan.ai/api" }
kite_testnet = { key = "${KITESCAN_API_KEY}", url = "https://testnet.kitescan.ai/api" }
