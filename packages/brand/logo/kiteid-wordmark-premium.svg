<?xml version="1.0" encoding="UTF-8"?>
<!--
  KiteID Wordmark — Premium Gradient
  Both "Kite" and "ID" in Aged Bronze gradient
  Use case: hero sections, premium contexts, marketing
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 320 80"
  width="320"
  height="80"
  role="img"
  aria-label="KiteID"
>
  <title>KiteID</title>
  <defs>
    <linearGradient id="kid-premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#A87C52"/>
      <stop offset="50%"  stop-color="#C9986A"/>
      <stop offset="100%" stop-color="#E8B987"/>
    </linearGradient>
  </defs>
  <style>
    .kite { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; font-weight: 400; fill: url(#kid-premium-gradient); letter-spacing: -1.2px; }
    .id   { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; font-weight: 800; fill: url(#kid-premium-gradient); letter-spacing: -1.2px; }
  </style>
  <text x="0" y="58" font-size="64" class="kite">Kite</text>
  <text x="138" y="58" font-size="64" class="id">ID</text>
</svg>
